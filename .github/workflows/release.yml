name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.10.x
          cache: 'npm'
      - run: npm ci --audit false
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - name: Set release version
        run: |
          BASE=$(node -p "require('./package.json').version.split('.').slice(0, 2).join('.')")
          VERSION="${BASE}.${{ github.run_number }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
      - name: Build distributables
        run: npm run make
        env:
          NODE_ENV: production
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${VERSION}"
          FILES=()
          while IFS= read -r f; do
            FILES+=("$f")
          done < <(find out/make -type f -name '*.zip')
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No distributables found in out/make" >&2
            exit 1
          fi
          gh release create "$TAG" "${FILES[@]}" \
            --title "$TAG" \
            --target "$GITHUB_SHA" \
            --notes-file .github/RELEASE_NOTES.md \
            --generate-notes
