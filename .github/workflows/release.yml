name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.10.x
          cache: 'npm'
      - run: npm ci --audit false
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - name: Build distributables
        run: npm run make
        env:
          NODE_ENV: production
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}-build.${{ github.run_number }}"
          mapfile -t FILES < <(find out/make -type f -name '*.zip')
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No distributables found in out/make" >&2
            exit 1
          fi
          gh release create "$TAG" "${FILES[@]}" \
            --title "v${VERSION} (build ${{ github.run_number }})" \
            --target "$GITHUB_SHA" \
            --generate-notes
